<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <!-- Laad de Trello bibliotheek in voor de achterkant -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #172b4d;
            margin: 0;
            padding: 0;
        }
        #info-box {
            background-color: #f4f5f7;
            border-left: 4px solid #ffcc00; /* Mooi geel matchend met de planning */
            padding: 8px 12px;
            border-radius: 3px;
            white-space: pre-wrap; /* Zorgt dat regeleinden behouden blijven */
        }
    </style>
</head>
<body>

    <!-- Hierin komt de tekst te staan -->
    <div id="info-box">Informatie ophalen...</div>

    <script>
        // Initialiseer de Trello Power-Up client voor een iframe
        var t = TrelloPowerUp.iframe();

        // t.render wordt door Trello getriggerd zodra het iframe getoond wordt
        t.render(function() {
            return t.get('card', 'shared', 'infoPlaatsing')
            .then(function(infoPlaatsing) {
                var element = document.getElementById('info-box');
                
                if (infoPlaatsing && infoPlaatsing.trim() !== "") {
                    element.textContent = infoPlaatsing;
                } else {
                    element.textContent = "Geen specifieke plaatsingsinfo ingevuld in de planning.";
                }
            })
            .then(function() {
                // HEEL BELANGRIJK: Dit vertelt Trello dat het laden klaar is en stopt de "Laden..." spinner!
                return t.sizeTo(document.body);
            })
            .catch(function(err) {
                console.error("Fout bij ophalen infoPlaatsing:", err);
            });
        });
    </script>
</body>
</html>
