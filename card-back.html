<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 8px 12px;
            color: #172b4d;
            font-size: 14px;
            background-color: #f4f5f7;
            border-left: 4px solid #0052cc;
            border-radius: 3px;
            line-height: 1.4;
            white-space: pre-wrap; /* Zorgt dat enters/regels netjes behouden blijven */
        }
    </style>
</head>
<body>

    <div id="plaatsings-info-box">Laden...</div>

    <script>
        var t = TrelloPowerUp.iframe();

        // Dit script draait zodra Trello de achterkant van de kaart opent
        t.render(function() {
            return t.get('card', 'shared', 'infoPlaatsing', '')
            .then(function(tekst) {
                // Zet de opgeslagen tekst in ons div-je
                document.getElementById('plaatsings-info-box').innerText = tekst;
                
                // CRUCIAL: Dit vertelt Trello om het venster exact zo groot te maken als de tekst lang is
                t.sizeTo('body');
            });
        });
    </script>
</body>
</html>
