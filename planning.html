<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Ploegen Planning</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <link rel="stylesheet" href="planning.css">
</head>
<body>

    <div class="sidebar">
        <h2>📋 Alle huidige projecten</h2>
        <input type="text" id="sidebar-search" class="sidebar-search"
               placeholder="🔍 Zoek op naam of adres…" autocomplete="off">
        <div id="loading-msg">Kaarten laden…</div>
        <div id="error-msg">⚠️ Kon kaarten niet laden.</div>
        <div id="search-empty">Geen kaarten gevonden voor deze zoekterm.</div>
        <div id="sidebar-pool"></div>
    </div>

    <div class="main-content">
        <div class="main-content-header">
            <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
                <h2>📅 Ploegen Planning</h2>
                <span class="periode-label" id="periode-label"></span>
            </div>
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <div class="tijdlijn-nav" id="tijdlijn-nav">
                    <button type="button" class="nav-btn" id="nav-prev" title="Vorige periode">‹</button>
                    <button type="button" class="nav-today-btn" id="nav-today" title="Spring naar vandaag">Vandaag</button>
                    <button type="button" class="nav-btn" id="nav-next" title="Volgende periode">›</button>
                    <input type="date" class="nav-datepicker" id="nav-datepicker" title="Spring naar een datum">
                </div>
                <div class="view-switcher" id="view-switcher">
                    <button type="button" class="view-switch-btn" data-view-mode="week">Week</button>
                    <button type="button" class="view-switch-btn" data-view-mode="multi">2 weken</button>
                    <button type="button" class="view-switch-btn" data-view-mode="month">Maand</button>
                </div>
                <div class="print-btn-group" id="print-btn-group" title="Afdrukken">
                    <button type="button" class="print-btn" id="print-week-btn" title="Weekplanning afdrukken — A3 verticaal">
                        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 0h8a1 1 0 0 1 1 1v4H3V1a1 1 0 0 1 1-1zm-2 6h12a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm9 6H5v2h6v-2zm1-4a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5z"/>
                        </svg>
                        A3 VERTICAAL
                    </button>
                    <div class="print-btn-sep"></div>
                    <button type="button" class="print-btn" id="print-month-btn" title="2 weken / maandplanning afdrukken — A3 horizontaal">
                        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 0h8a1 1 0 0 1 1 1v4H3V1a1 1 0 0 1 1-1zm-2 6h12a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm9 6H5v2h6v-2zm1-4a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5z"/>
                        </svg>
                        A3 HORIZONTAAL
                    </button>
                </div>
                <div class="legenda" id="legenda">
                    <button type="button" class="legenda-toggle" id="legenda-toggle">
                        <span class="chev">▶</span> Legende projectleiders
                    </button>
                    <div class="legenda-items" id="legenda-items"></div>
                </div>
                <span class="mode-indicator" id="mode-indicator"></span>
                <button type="button" class="settings-btn" id="settings-btn" title="Instellingen" style="display:none">⚙️</button>
            </div>
        </div>
        <div class="zoom-toolbar" id="zoom-toolbar">
            <button type="button" class="zoom-bar-btn" id="zoom-out-btn" title="Uitzoomen (−)">−</button>
            <span class="zoom-bar-pct" id="zoom-indicator">100%</span>
            <button type="button" class="zoom-bar-btn" id="zoom-in-btn" title="Inzoomen (+)">+</button>
            <button type="button" class="zoom-bar-btn actief" id="zoom-fit-btn" title="Tabel horizontaal passend maken">↔</button>
        </div>
        <div class="table-scroll-wrap">
            <table class="planning-table">
                <thead>
                    <tr id="table-head-row">
                        <th class="col-ploeg">Ploeg</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="planning.js"></script>
</body>
</html>
