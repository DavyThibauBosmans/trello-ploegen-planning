        /* ── GENERIEK RESIZE-HANDVAT ── */
        function maakResizeHandle(onStart) {
            var h = document.createElement('div');
            h.className = 'span-resize-handle';
            h.title = 'Sleep om uit te rekken of in te korten';
            h.addEventListener('mousedown', onStart);
            return h;
        }

        /* ── VERLOF RESIZE ── */
        var verlofResizeState = null;
        function startVerlofResize(e, itemSnapshot) {
            if (!isAdmin) return;
            e.preventDefault();
            e.stopPropagation();
            verlofResizeState = {
                itemId:        itemSnapshot.id,
                naam:          itemSnapshot.naam,
                startDatum:    itemSnapshot.startDatum,
                origineelEind: itemSnapshot.eindDatum,
                huidigEind:    itemSnapshot.eindDatum
            };
            document.body.classList.add('span-resizing');
            document.addEventListener('mousemove', onVerlofResizeMove);
            document.addEventListener('mouseup',   onVerlofResizeEnd);
        }
        function onVerlofResizeMove(e) {
            if (!verlofResizeState) return;
            var el = document.elementFromPoint(e.clientX, e.clientY);
            if (!el) return;
            var zone = el.closest ? el.closest('.verlof-zone') : null;
            if (!zone || !zone.dataset.datum) return;
            var nieuweEind = zone.dataset.datum;
            var sD = ddMMNaarDate(verlofResizeState.startDatum);
            var nD = ddMMNaarDate(nieuweEind);
            if (sD && nD && nD < sD) nieuweEind = verlofResizeState.startDatum;
            if (nieuweEind === verlofResizeState.huidigEind) return;
            verlofResizeState.huidigEind = nieuweEind;
            hertekenEnkelVerlofItem({
                id: verlofResizeState.itemId, naam: verlofResizeState.naam,
                startDatum: verlofResizeState.startDatum, eindDatum: verlofResizeState.huidigEind,
                ploeg: VERLOF_ROW_KEY
            });
        }
        function onVerlofResizeEnd() {
            if (!verlofResizeState) return;
            document.body.classList.remove('span-resizing');
            document.removeEventListener('mousemove', onVerlofResizeMove);
            document.removeEventListener('mouseup',   onVerlofResizeEnd);
            var itemId = verlofResizeState.itemId;
            var nieuweEind = verlofResizeState.huidigEind;
            var ongewijzigd = (nieuweEind === verlofResizeState.origineelEind);
            verlofResizeState = null;
            if (ongewijzigd) return;
            t.get('board', 'shared', 'verlofItems', []).then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                return t.set('board', 'shared', 'verlofItems', arr.map(function(v) {
                    if (v.id === itemId) v.eindDatum = nieuweEind;
                    return v;
                }));
            });
        }

        /* ── STAP 4.3+: STAPELLOGICA ──
           Per cel (zoneId) houden we bij welke stapel-rijen bezet zijn.
           Een band die meerdere dagen beslaat krijgt de laagste rij die
           over ALLE beslagen cellen vrij is, zodat overlappende banden
           netjes onder elkaar komen i.p.v. over elkaar.
           Structuur: stackMap[zoneId] = { rijIndex: instanceId, ... } */
        var stackMap = {};
        var BAND_HOOGTE = 56;   /* px hoogte per band-rij in de cel */
        var BAND_GAP    = 4;    /* px ruimte tussen banden */
        var BAND_TOP    = 6;    /* px afstand van cel-top */

        function rijNaarTop(rij) { return BAND_TOP + rij * (BAND_HOOGTE + BAND_GAP); }

        /* Vind de laagste rij die vrij is in elk van de opgegeven zones,
           en reserveer die rij voor instanceId. Retourneert {rij, top}. */
        function stapelReserveer(zoneIds, instanceId) {
            zoneIds.forEach(function(zid) { if (!stackMap[zid]) stackMap[zid] = {}; });

            var rij = 0;
            while (true) {
                var vrij = zoneIds.every(function(zid) {
                    var bezetter = stackMap[zid][rij];
                    return bezetter === undefined || bezetter === instanceId;
                });
                if (vrij) break;
                rij++;
                if (rij > 200) break; /* veiligheidsklep */
            }

            zoneIds.forEach(function(zid) { stackMap[zid][rij] = instanceId; });
            zoneIds.forEach(updateZoneHoogte);
            return { rij: rij, top: rijNaarTop(rij) };
        }

        /* Verwijder een instanceId uit alle zones in stackMap en update hoogtes. */
        function stapelVrijgeven(instanceId) {
            Object.keys(stackMap).forEach(function(zid) {
                var zone = stackMap[zid];
                Object.keys(zone).forEach(function(rij) {
                    if (zone[rij] === instanceId) delete zone[rij];
                });
                updateZoneHoogte(zid);
            });
        }

        /* Zet de minHeight van een zone op basis van de hoogst bezette rij. */
        function updateZoneHoogte(zoneId) {
            var zone = document.getElementById(zoneId);
            if (!zone) return;
            var zoneRijen = stackMap[zoneId] || {};
            var maxRij = -1;
            Object.keys(zoneRijen).forEach(function(r) {
                var ri = parseInt(r, 10);
                if (ri > maxRij) maxRij = ri;
            });
            if (maxRij < 0) {
                zone.style.minHeight = '';   /* vrij om te groeien met inhoud van label-kolom */
            } else {
                var nodig = rijNaarTop(maxRij) + BAND_HOOGTE + 30 /* ruimte add-knop */;
                zone.style.minHeight = Math.max(80, nodig) + 'px';
            }
        }

        /* ── STAP 4.3 FIX: GEDEELDE BAAN-LAYOUT (geen overlap meer) ──
           Alle items in een ploeg-rij (1-dag kaarten, doorlopende banden én
           snelle interventies) krijgen een baan-index via stapelReserveer.
           Deze functie meet de echte inhoudshoogte per baan, neemt per baan de
           grootste hoogte over de hele rij (zodat doorlopende banden netjes over
           kolommen uitlijnen) en plaatst elk item op de juiste top/hoogte.
           Resultaat: niets overlapt, niets wordt afgekapt. */
        function herlayoutPloegRijen() {
            var zones = document.querySelectorAll('.dropzone[data-row-type="ploeg"]');
            var perPloeg = {};
            zones.forEach(function(z) {
                var pl = z.dataset.ploeg;
                if (pl === undefined) return;
                if (!perPloeg[pl]) perPloeg[pl] = [];
                perPloeg[pl].push(z);
            });

            Object.keys(perPloeg).forEach(function(pl) {
                var cellen = perPloeg[pl];
                var baanHoogtes = {};
                var items = [];

                /* Pass 1: meet natuurlijke hoogte per item, bepaal max per baan */
                cellen.forEach(function(z) {
                    z.querySelectorAll('.planning-card, .placement-band').forEach(function(el) {
                        if (el.dataset.lane === undefined || el.dataset.lane === '') return;
                        var baan = parseInt(el.dataset.lane, 10);
                        if (isNaN(baan)) return;
                        el.style.height = 'auto';   /* meet inhoudshoogte */
                        var h = el.offsetHeight;
                        if (!baanHoogtes[baan] || h > baanHoogtes[baan]) baanHoogtes[baan] = h;
                        items.push({ el: el, baan: baan });
                    });
                });

                /* Banen op volgorde + cumulatieve tops berekenen */
                var banen = Object.keys(baanHoogtes)
                    .map(function(k) { return parseInt(k, 10); })
                    .sort(function(a, b) { return a - b; });
                var tops = {};
                var cursor = BAND_TOP;
                banen.forEach(function(b) {
                    tops[b] = cursor;
                    cursor += baanHoogtes[b] + BAND_GAP;
                });
                var totaal = (banen.length ? (cursor - BAND_GAP) : BAND_TOP) + 30 /* ruimte add-knop */;

                /* Pass 2: definitieve top + hoogte toepassen */
                items.forEach(function(it) {
                    it.el.style.top    = tops[it.baan] + 'px';
                    it.el.style.height = baanHoogtes[it.baan] + 'px';
                    it.el.style.bottom = 'auto';
                });

                cellen.forEach(function(z) {
                    z.style.minHeight = Math.max(80, totaal) + 'px';
                });
            });
        }
        function placementStart(p) { return p.datum; }
        function placementEind(p)  { return p.eindDatum || p.datum; }

        function hertekenEnkelPlacement(p, ctx) {
            /* Verwijder alle DOM-segmenten van deze instantie */
            document.querySelectorAll('[data-instance-id="' + p.instanceId + '"]').forEach(function(el) {
                if (el.parentNode) el.parentNode.removeChild(el);
            });
            /* Geef de stapel-rijen vrij die deze instantie bezette */
            stapelVrijgeven(p.instanceId);
            tekenPlacement(p, ctx);
            herlayoutPloegRijen();
        }

        function tekenPlacement(p, ctx) {
            if (!p.ploeg || !p.datum) return;
            placementCtx[p.instanceId] = ctx;

            var start = placementStart(p);
            var eind  = placementEind(p);
            var dagen = dagenBinnenWeek(start, eind);
            if (dagen.length === 0) return;

            var meerdaags = (start !== eind) && (dagen.length > 1 ||
                /* ook bij gedeeltelijk-in-week-zicht een band tonen */
                (aantalDagenTussen(start, eind) > 0));

            if (!meerdaags) {
                /* 1 dag → volledige kaart (met resize-handvat), nu óók in baan-systeem */
                var zoneId = maakZoneId(p.ploeg, start);
                var zone = document.getElementById(zoneId);
                if (!zone) return;
                var pos1 = stapelReserveer([zoneId], p.instanceId);
                var kaart = maakTrelloInstantieKaart(ctx.card, p, {
                    isArchief: ctx.isArchief, kanTonen: ctx.kanTonen, url: ctx.url,
                    metResize: true, ctx: ctx
                });
                kaart.dataset.lane     = pos1.rij;
                kaart.dataset.ploegRow = p.ploeg;
                zone.appendChild(kaart);
            } else {
                /* Meerdere dagen → doorlopende band, per dag een segment, gestapeld.
                   Reserveer één rij die over ALLE beslagen cellen vrij is. */
                var zoneIds = dagen.map(function(dag) { return maakZoneId(p.ploeg, dag.datum); });
                var pos = stapelReserveer(zoneIds, p.instanceId);

                dagen.forEach(function(dag) {
                    var zone = document.getElementById(maakZoneId(p.ploeg, dag.datum));
                    if (!zone) return;
                    var seg = maakPlacementBandSegment(ctx.card, p, {
                        datum: dag.datum,
                        isFirstVisible: dag.isFirstVisible,
                        isLastVisible:  dag.isLastVisible,
                        ctx: ctx,
                        top:    pos.top,
                        height: BAND_HOOGTE
                    });
                    seg.dataset.lane     = pos.rij;
                    seg.dataset.ploegRow = p.ploeg;
                    zone.appendChild(seg);
                });
            }
        }

        function maakPlacementBandSegment(card, p, opts) {
            var ctx = opts.ctx;
            var el = document.createElement('div');
            el.className = 'placement-band';
            if (!opts.isFirstVisible) el.classList.add('band-not-first');
            if (!opts.isLastVisible)  el.classList.add('band-not-last');

            /* Zwevend? */
            if (p.zwevend) el.classList.add('zwevend');

            el.id = 'pseg-' + p.instanceId + '-' + opts.datum;
            el.dataset.instanceId = p.instanceId;
            el.dataset.datum      = opts.datum;
            el.dataset.rol        = 'instantie';
            el.draggable = isAdmin;

            /* Stapelpositie: top en hoogte uit de berekende stack */
            el.style.top    = (opts.top !== undefined ? opts.top : 6) + 'px';
            el.style.height = (opts.height !== undefined ? opts.height : BAND_HOOGTE) + 'px';
            el.style.bottom = 'auto';

            var stijl = bepaalTrelloKaartStijl(card.members);
            el.style.backgroundColor = stijl.bg;
            el.style.color           = stijl.text;

            if (opts.isFirstVisible) {
                var body = document.createElement('div');
                body.className = 'card-body';
                vulTrelloBasis(body, card);

                if (ctx.isArchief) {
                    var tag = document.createElement('span');
                    tag.className = 'archief-tag';
                    tag.innerText = '📦 Archief';
                    body.appendChild(tag);
                }

                /* Zwevend-badge */
                if (p.zwevend) {
                    var zbadge = document.createElement('span');
                    zbadge.className = 'zwevend-badge';
                    zbadge.innerText = '☁ Onzeker';
                    body.appendChild(zbadge);
                }

                var infoEl = document.createElement('div');
                infoEl.className = 'card-info-placement';
                infoEl.innerText = p.infoPlaatsing || '';
                maakBewerkbaarVeld(infoEl, function(txt) {
                    updateInstantieInfo(cardIdVanInstantie(p.instanceId), p.instanceId, txt);
                });
                body.appendChild(infoEl);

                el.appendChild(body);

                /* Zwevend-toggle knop (enkel voor admin, in first segment) */
                if (isAdmin) {
                    var zwBtn = document.createElement('span');
                    zwBtn.className = 'zwevend-toggle-btn' + (p.zwevend ? ' actief' : '');
                    zwBtn.title = p.zwevend ? 'Markeer als zeker ingepland' : 'Markeer als onzeker (zwevend)';
                    zwBtn.innerHTML = '☁';
                    (function(placement, segEl) {
                        zwBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            toggleZwevend(placement, ctx);
                        });
                    })(p, el);

                    var controls = document.createElement('div');
                    controls.className = 'card-controls band-controls';
                    controls.appendChild(zwBtn);
                    el.appendChild(controls);
                }
            }

            if (opts.isLastVisible && isAdmin) {
                var handle = maakResizeHandle(function(e) { startPlacementResize(e, p, ctx); });
                el.appendChild(handle);
            }

            el.addEventListener('dragstart', drag);
            el.addEventListener('dragend',   dragEnd);

            koppelKaartOpenen(el, {
                kaartData: card, kanTonen: !!ctx.kanTonen,
                cardId: cardIdVanInstantie(p.instanceId), url: ctx.url || ''
            });

            return el;
        }

        /* ── ZWEVEND TOGGLE ── */
        function toggleZwevend(p, ctx) {
            if (!isAdmin) return;
            var cardId = cardIdVanInstantie(p.instanceId);
            t.get(cardId, 'shared', 'placements', []).then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                arr = arr.map(function(pl) {
                    if (pl.instanceId === p.instanceId) {
                        pl.zwevend = !pl.zwevend;
                        p.zwevend  = pl.zwevend;  /* lokale referentie ook bijwerken */
                    }
                    return pl;
                });
                return t.set(cardId, 'shared', 'placements', arr);
            }).then(function() {
                hertekenEnkelPlacement(p, ctx);
            });
        }

        /* ── PLACEMENT RESIZE ── */
        var placementResizeState = null;
        function startPlacementResize(e, p, ctx) {
            if (!isAdmin) return;
            e.preventDefault();
            e.stopPropagation();
            placementResizeState = {
                instanceId: p.instanceId,
                cardId:     cardIdVanInstantie(p.instanceId),
                ploeg:      p.ploeg,
                start:      placementStart(p),
                origEind:   placementEind(p),
                huidigEind: placementEind(p),
                werkItem:   {
                    instanceId: p.instanceId, ploeg: p.ploeg,
                    datum: placementStart(p), eindDatum: placementEind(p),
                    infoPlaatsing: p.infoPlaatsing,
                    zwevend: p.zwevend
                },
                ctx: ctx
            };
            document.body.classList.add('span-resizing');
            document.addEventListener('mousemove', onPlacementResizeMove);
            document.addEventListener('mouseup',   onPlacementResizeEnd);
        }
        function onPlacementResizeMove(e) {
            if (!placementResizeState) return;
            var el = document.elementFromPoint(e.clientX, e.clientY);
            if (!el) return;
            var zone = el.closest ? el.closest('.dropzone') : null;
            if (!zone || zone.dataset.rowType !== 'ploeg') return;
            if (zone.dataset.ploeg !== placementResizeState.ploeg) return;  // enkel binnen dezelfde ploeg-rij
            var nieuwEind = zone.dataset.datum;
            var sD = ddMMNaarDate(placementResizeState.start);
            var nD = ddMMNaarDate(nieuwEind);
            if (sD && nD && nD < sD) nieuwEind = placementResizeState.start;
            if (nieuwEind === placementResizeState.huidigEind) return;
            placementResizeState.huidigEind = nieuwEind;
            placementResizeState.werkItem.eindDatum = nieuwEind;
            hertekenEnkelPlacement(placementResizeState.werkItem, placementResizeState.ctx);
        }
        function onPlacementResizeEnd() {
            if (!placementResizeState) return;
            document.body.classList.remove('span-resizing');
            document.removeEventListener('mousemove', onPlacementResizeMove);
            document.removeEventListener('mouseup',   onPlacementResizeEnd);
            var st = placementResizeState;
            placementResizeState = null;
            if (st.huidigEind === st.origEind) return;
            t.get(st.cardId, 'shared', 'placements', []).then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                return t.set(st.cardId, 'shared', 'placements', arr.map(function(p) {
                    if (p.instanceId === st.instanceId) {
                        if (st.huidigEind === p.datum) { delete p.eindDatum; }   // terug naar 1 dag
                        else { p.eindDatum = st.huidigEind; }
                    }
                    return p;
                }));
            });
        }

        /* ── HOOFDLAADFUNCTIE ── */
        function laadEnRenderAlles() {
            berekenWeekDatums();
            bouwLegende();
            trelloKaartCache = {};
            placementCtx = {};
            stackMap = {};   /* stapellogica resetten bij herladen */

            var pool       = document.getElementById('sidebar-pool');
            var loadingMsg = document.getElementById('loading-msg');
            var errorMsg   = document.getElementById('error-msg');

            if (loadingMsg) loadingMsg.style.display = 'block';
            if (errorMsg)   errorMsg.style.display   = 'none';
            if (pool)       pool.innerHTML = '';

            if (DEV_MODE) {
                isAdmin = true;
                toepassenAdminStatus();
            } else {
                t.member('username').then(function(member) {
                    var username = (member && member.username) ? member.username.toLowerCase() : '';
                    isAdmin = ADMIN_USERNAMES.indexOf(username) !== -1;
                    toepassenAdminStatus();
                }).catch(function() { isAdmin = false; toepassenAdminStatus(); });
            }

            return Promise.all([
                t.cards('id', 'name', 'members', 'address', 'desc', 'idList', 'url', 'labels', 'due', 'dueComplete'),
                t.lists('id', 'name'),
                t.get('board', 'shared', 'interventions', []),
                t.get('board', 'shared', 'plannedCardIds', []),
                t.get('board', 'shared', 'ploegen',       null),
                t.get('board', 'shared', 'verlofItems',   [])
            ])
            .then(function(resultaten) {
                var cards             = resultaten[0];
                var lists             = resultaten[1];
                var interventions     = resultaten[2];
                var indexIds          = Array.isArray(resultaten[3]) ? resultaten[3] : [];
                var opgeslagenPloegen = resultaten[4];
                var verlofItems       = Array.isArray(resultaten[5]) ? resultaten[5] : [];

                if (Array.isArray(opgeslagenPloegen) && opgeslagenPloegen.length > 0) {
                    ploegen = opgeslagenPloegen.slice();
                } else {
                    ploegen = DEFAULT_PLOEGEN.slice();
                    t.set('board', 'shared', 'ploegen', ploegen);
                }

                /* Migratie verlof: oude {datum} → {startDatum, eindDatum} */
                var verlofMigratieNodig = false;
                verlofItems.forEach(function(v) {
                    if (!v.startDatum && v.datum) {
                        v.startDatum = v.datum;
                        v.eindDatum  = v.eindDatum || v.datum;
                        delete v.datum;
                        verlofMigratieNodig = true;
                    }
                    if (!v.eindDatum && v.startDatum) { v.eindDatum = v.startDatum; verlofMigratieNodig = true; }
                });
                if (verlofMigratieNodig) t.set('board', 'shared', 'verlofItems', verlofItems);

                bouwTabel();
                if (loadingMsg) loadingMsg.style.display = 'none';

                var archiefLijstIds = {};
                lists.forEach(function(l) { if (isArchiefLijst(l.name)) archiefLijstIds[l.id] = true; });

                var visibleById = {};
                cards.forEach(function(c) { visibleById[c.id] = c; });

                var alleIds = [];
                var gezien  = {};
                cards.forEach(function(c)  { if (!gezien[c.id]) { gezien[c.id] = true; alleIds.push(c.id); } });
                indexIds.forEach(function(id) { if (!gezien[id]) { gezien[id] = true; alleIds.push(id); } });

                var idPromises = alleIds.map(function(cardId) {
                    return Promise.all([
                        t.get(cardId, 'shared', 'placements',    null),
                        t.get(cardId, 'shared', 'planning',      null),
                        t.get(cardId, 'shared', 'infoPlaatsing', ''),
                        t.get(cardId, 'shared', 'cardSnapshot',  null)
                    ]).then(function(stored) {
                        var placements   = stored[0];
                        var cardSnapshot = stored[3];   /* gedeelde snapshot (1x per kaart) */

                        if (!Array.isArray(placements)) {
                            var oud = stored[1];
                            if (oud && oud.ploeg && oud.datum) {
                                placements = [{
                                    instanceId:    genInstanceId(cardId),
                                    ploeg:         oud.ploeg,
                                    datum:         oud.datum,
                                    infoPlaatsing: stored[2] || ''
                                }];
                                t.set(cardId, 'shared', 'placements', placements);
                            } else { placements = []; }
                        }

                        /* ── MIGRATIE: oude ingebedde snapshots → één gedeelde cardSnapshot ──
                           Vroeger droeg elke placement een eigen .snapshot. Dat blies de
                           opslag op (limiet ~10x). We trekken die eruit, bewaren er één,
                           en strippen de placements. */
                        var migratieNodig = false;
                        placements.forEach(function(p) {
                            if (p.snapshot) {
                                if (!cardSnapshot) {
                                    /* Eerste gevonden snapshot wordt de gedeelde; normaliseer naar compact formaat */
                                    var s = p.snapshot;
                                    if (s.n !== undefined) { cardSnapshot = s; }
                                    else {
                                        cardSnapshot = {
                                            n: s.name || '', a: s.address || '', u: s.url || '',
                                            m: (s.members || []).map(function(m) { return m.username || m; })
                                        };
                                    }
                                }
                                delete p.snapshot;
                                migratieNodig = true;
                            }
                        });

                        return {
                            cardId: cardId, placements: placements,
                            cardSnapshot: cardSnapshot, migratieNodig: migratieNodig
                        };
                    });
                });

                return Promise.all(idPromises).then(function(resultatenPerId) {
                    var nieuweIndex = [];

                    resultatenPerId.forEach(function(r) {
                        var cardId       = r.cardId;
                        var placements   = r.placements;
                        var cardSnapshot = r.cardSnapshot;
                        var migratieNodig = r.migratieNodig;
                        var liveCard     = visibleById[cardId];
                        var isZichtbaar    = !!liveCard;
                        var inArchiefLijst = isZichtbaar && !!archiefLijstIds[liveCard.idList];
                        var verbergUitZijbalk = (!isZichtbaar) || inArchiefLijst;

                        if (placements.length > 0 && nieuweIndex.indexOf(cardId) === -1) nieuweIndex.push(cardId);

                        if (isZichtbaar) {
                            trelloKaartCache[cardId] = liveCard;
                            /* Houd de gedeelde snapshot vers zolang de kaart live is */
                            var verseSnap = maakKaartSnapshot(liveCard);
                            if (JSON.stringify(cardSnapshot) !== JSON.stringify(verseSnap)) {
                                cardSnapshot = verseSnap;
                                t.set(cardId, 'shared', 'cardSnapshot', cardSnapshot);
                            }
                        }

                        /* Migratie-resultaat wegschrijven: geslankte placements + losse snapshot */
                        if (migratieNodig) {
                            t.set(cardId, 'shared', 'placements', placements);
                            if (cardSnapshot) t.set(cardId, 'shared', 'cardSnapshot', cardSnapshot);
                        }

                        if (isZichtbaar && !verbergUitZijbalk) {
                            pool.appendChild(maakTrelloBronKaart(liveCard, placements.length));
                        }

                        placements.forEach(function(p) {
                            if (!p.ploeg || !p.datum) return;
                            var kaartData = isZichtbaar ? liveCard : snapshotNaarKaart(cardSnapshot || {});
                            var openUrl   = isZichtbaar ? (liveCard.url || '')
                                                        : ((cardSnapshot && (cardSnapshot.u || cardSnapshot.url)) || '');
                            var ctx = {
                                card: kaartData, kanTonen: isZichtbaar,
                                url: openUrl, isArchief: verbergUitZijbalk, ploeg: p.ploeg
                            };
                            tekenPlacement(p, ctx);
                        });
                    });

                    if (JSON.stringify(nieuweIndex.slice().sort()) !== JSON.stringify(indexIds.slice().sort())) {
                        t.set('board', 'shared', 'plannedCardIds', nieuweIndex);
                    }

                    interventions.forEach(function(int) {
                        var el = maakInterventieKaart(int);
                        if (int.ploeg && int.datum) {
                            var izoneId = maakZoneId(int.ploeg, int.datum);
                            var zone = document.getElementById(izoneId);
                            if (zone) {
                                var iposR = stapelReserveer([izoneId], int.id);
                                el.dataset.lane     = iposR.rij;
                                el.dataset.ploegRow = int.ploeg;
                                zone.appendChild(el);
                            } else { pool.appendChild(el); }
                        } else { pool.appendChild(el); }
                    });

                    verlofItems.forEach(function(v) { tekenVerlofItem(v); });

                    herlayoutPloegRijen();   /* definitieve baan-layout (geen overlap) */

                    var zoekVeld = document.getElementById('sidebar-search');
                    if (zoekVeld) filterZijbalk(zoekVeld.value);
                });
            })
            .catch(function(err) {
                console.error('Fout bij laden kaarten:', err && err.message ? err.message : err);
                if (loadingMsg) loadingMsg.style.display = 'none';
                if (errorMsg)   errorMsg.style.display   = 'block';
            });
        }

        t.render(laadEnRenderAlles);

        /* ── HULPFUNCTIE: VELD BEWERKBAAR MAKEN ── */
        function maakBewerkbaarVeld(veldEl, opslaanCallback) {
            veldEl.contentEditable = false;
            veldEl.addEventListener('click', function() {
                if (!isAdmin) return;
                if (veldEl.isContentEditable) return;
                veldEl.contentEditable = true;
                veldEl.focus();
                var range = document.createRange();
                range.selectNodeContents(veldEl);
                range.collapse(false);
                var sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });
            veldEl.addEventListener('blur', function() {
                veldEl.contentEditable = false;
                var txt = veldEl.innerText.trim();
                if (!txt) { veldEl.innerHTML = ''; }
                opslaanCallback(txt);
            });
            veldEl.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        e.preventDefault();
                        if (document.queryCommandSupported && document.queryCommandSupported('insertLineBreak')) {
                            document.execCommand('insertLineBreak');
                        } else {
                            var sel = window.getSelection();
                            if (sel && sel.rangeCount > 0) {
                                var range = sel.getRangeAt(0);
                                range.deleteContents();
                                var br = document.createElement('br');
                                range.insertNode(br);
                                range.setStartAfter(br);
                                range.setEndAfter(br);
                                sel.removeAllRanges();
                                sel.addRange(range);
                            }
                        }
                    } else { e.preventDefault(); veldEl.blur(); }
                }
            });
        }

        /* ── GEDEELDE PROJECTINHOUD ── */
        function vulTrelloBasis(bodyContainer, card) {
            var titleEl = document.createElement('div');
            titleEl.className = 'card-title';
            titleEl.innerText = card.name;
            bodyContainer.appendChild(titleEl);

            if (card.address) {
                var adresEl = document.createElement('div');
                adresEl.className = 'card-address';
                adresEl.innerText = '📍 ' + card.address;
                bodyContainer.appendChild(adresEl);
            }
            if (card.desc) {
                var extraFields = parseDescriptionFields(card.desc);
                for (var label in extraFields) {
                    if (label.indexOf('Adres') !== -1 && card.address) continue;
                    var fieldEl = document.createElement('div');
                    fieldEl.className = 'card-address';
                    fieldEl.innerText = label + ': ' + extraFields[label];
                    bodyContainer.appendChild(fieldEl);
                }
            }
        }

        /* ── KAART-INFO POPUP ── */
        function koppelKaartOpenen(el, info) {
            if (!info || (!info.cardId && !info.url)) return;
            el.title = 'Klik voor kaartinfo — de planning blijft open';
            el.addEventListener('click', function(e) {
                if (e.target.closest('.card-info-placement, .card-address-editable, .card-controls, .span-resize-handle')) return;
                var sel = window.getSelection();
                if (sel && sel.toString().length > 0) return;
                toonKaartPopup(info.kaartData || {}, info);
            });
        }

        function sluitKaartPopup() {
            var bestaand = document.getElementById('card-popup-overlay');
            if (bestaand && bestaand.parentNode) bestaand.parentNode.removeChild(bestaand);
        }

        var TRELLO_LABEL_KLEUREN = {
            green:'#61bd4f', yellow:'#f2d600', orange:'#ff9f1a', red:'#eb5a46',
            purple:'#c377e0', blue:'#0079bf', sky:'#00c2e0', lime:'#51e898',
            pink:'#ff78cb', black:'#344563'
        };
        function labelKleur(c) {
            if (!c) return '#b3bac5';
            var basis = String(c).split('_')[0];
            return TRELLO_LABEL_KLEUREN[basis] || '#b3bac5';
        }
        function formatteerDatum(iso) {
            if (!iso) return '';
            var d = new Date(iso);
            if (isNaN(d.getTime())) return '';
            var dd = String(d.getDate()).padStart(2, '0');
            var mm = String(d.getMonth() + 1).padStart(2, '0');
            var hh = String(d.getHours()).padStart(2, '0');
            var mi = String(d.getMinutes()).padStart(2, '0');
            return dd + '/' + mm + '/' + d.getFullYear() + ' ' + hh + ':' + mi;
        }

        function toonKaartPopup(kaartData, info) {
            sluitKaartPopup();
            var overlay = document.createElement('div');
            overlay.className = 'card-popup-overlay';
            overlay.id        = 'card-popup-overlay';
            overlay.addEventListener('click', function(e) { if (e.target === overlay) sluitKaartPopup(); });

            function onEsc(ev) {
                if (ev.key === 'Escape') { sluitKaartPopup(); document.removeEventListener('keydown', onEsc); }
            }
            document.addEventListener('keydown', onEsc);

            var popup = document.createElement('div');
            popup.className = 'card-popup';

            var sluit = document.createElement('span');
            sluit.className = 'card-popup-close';
            sluit.innerHTML = '&times;';
            sluit.title = 'Sluiten (terug naar planning)';
            sluit.addEventListener('click', sluitKaartPopup);
            popup.appendChild(sluit);

            var stijl = bepaalTrelloKaartStijl(kaartData.members);
            var bar = document.createElement('div');
            bar.className = 'card-popup-color-bar';
            bar.style.backgroundColor = stijl.bg;
            popup.appendChild(bar);

            var titel = document.createElement('div');
            titel.className = 'card-popup-title';
            titel.innerText = kaartData.name || '(naam onbekend)';
            popup.appendChild(titel);

            var ledenNamen = (kaartData.members || []).map(function(m) {
                return m.fullName || m.username || m.initials || '';
            }).filter(function(n) { return n; });
            if (ledenNamen.length) {
                var leden = document.createElement('div');
                leden.className = 'card-popup-field';
                leden.innerText = '👥 ' + ledenNamen.join(', ');
                popup.appendChild(leden);
            }

            if (kaartData.labels && kaartData.labels.length) {
                var labelWrap = document.createElement('div');
                labelWrap.className = 'card-popup-labels';
                kaartData.labels.forEach(function(lbl) {
                    var chip = document.createElement('span');
                    chip.className = 'card-popup-label';
                    chip.style.backgroundColor = labelKleur(lbl.color);
                    chip.innerText = lbl.name || (lbl.color || 'label');
                    labelWrap.appendChild(chip);
                });
                popup.appendChild(labelWrap);
            }

            if (kaartData.due) {
                var due = document.createElement('div');
                due.className = 'card-popup-field';
                due.innerText = '📅 Vervaldatum: ' + formatteerDatum(kaartData.due)
                    + (kaartData.dueComplete ? ' ✓ voltooid' : '');
                popup.appendChild(due);
            }

            var adresTekst = kaartData.address || '';
            if (adresTekst) {
                var adr = document.createElement('div');
                adr.className = 'card-popup-field';
                adr.innerText = '📍 ' + adresTekst;
                popup.appendChild(adr);
            }

            if (kaartData.desc && kaartData.desc.trim()) {
                var descLabel = document.createElement('div');
                descLabel.className = 'card-popup-section-label';
                descLabel.innerText = '📝 Omschrijving';
                popup.appendChild(descLabel);
                var descBlok = document.createElement('div');
                descBlok.className = 'card-popup-desc';
                descBlok.innerText = kaartData.desc;
                popup.appendChild(descBlok);
            } else if (!adresTekst && !ledenNamen.length) {
                var leeg = document.createElement('div');
                leeg.className = 'card-popup-field';
                leeg.style.fontStyle = 'italic';
                leeg.style.opacity = '0.7';
                leeg.innerText = 'Geen extra info beschikbaar — open de volledige kaart voor alle details.';
                popup.appendChild(leeg);
            }

            if (!info.kanTonen) {
                var archiefNoot = document.createElement('div');
                archiefNoot.className = 'card-popup-field';
                archiefNoot.style.fontStyle = 'italic';
                archiefNoot.style.opacity = '0.7';
                archiefNoot.style.marginTop = '8px';
                archiefNoot.innerText = '📦 Gearchiveerde kaart — beperkte momentopname.';
                popup.appendChild(archiefNoot);
            }

            var btn = document.createElement('button');
            btn.className = 'card-popup-open-btn';
            btn.type = 'button';
            btn.innerText = '📇 Volledige kaart openen in Trello';
            btn.addEventListener('click', function() {
                document.removeEventListener('keydown', onEsc);
                sluitKaartPopup();
                if (info.kanTonen && info.cardId) { t.showCard(info.cardId); }
                else if (info.url) { t.navigate({ url: info.url }); }
            });
            popup.appendChild(btn);

            var hint = document.createElement('div');
            hint.className = 'card-popup-hint';
            hint.innerText = 'Sluit deze popup (Esc of ×) om verder te plannen — de planning blijft open.';
            popup.appendChild(hint);

            overlay.appendChild(popup);
            document.body.appendChild(overlay);
        }

        /* ── BRON-KAART ── */
        function maakTrelloBronKaart(card, aantalGepland) {
            var el = document.createElement('div');
            el.className = 'planning-card';
            el.id        = card.id;
            el.draggable = isAdmin;
            el.dataset.rol = 'bron';

            var body = document.createElement('div');
            body.className = 'card-body';
            vulTrelloBasis(body, card);

            var badge = document.createElement('span');
            badge.className = 'plan-badge';
            body.appendChild(badge);

            el.appendChild(body);

            var stijl = bepaalTrelloKaartStijl(card.members);
            el.style.backgroundColor = stijl.bg;
            el.style.color           = stijl.text;

            el.addEventListener('dragstart', drag);
            el.addEventListener('dragend',   dragEnd);

            koppelKaartOpenen(el, { kaartData: card, kanTonen: true, cardId: card.id, url: card.url || '' });
            zetBronBadge(el, aantalGepland);
            return el;
        }

        function zetBronBadge(el, count) {
            if (!el) return;
            var badge = el.querySelector('.plan-badge');
            if (!badge) return;
            if (count > 0) { badge.innerText = '📌 ' + count + '× ingepland'; badge.style.display = 'inline-block'; }
            else { badge.style.display = 'none'; }
        }
        function updateBronBadgeById(cardId, count) {
            zetBronBadge(document.getElementById(cardId), count);
        }

        /* ── INSTANTIE-KAART (1 dag) ── */
        function maakTrelloInstantieKaart(card, placement, opts) {
            opts = opts || {};
            var el = document.createElement('div');
            el.className = 'planning-card';
            if (placement.zwevend) el.classList.add('zwevend');
            el.id        = placement.instanceId;
            el.dataset.instanceId = placement.instanceId;
            el.draggable = isAdmin;
            el.dataset.rol = 'instantie';

            var body = document.createElement('div');
            body.className = 'card-body';
            vulTrelloBasis(body, card);

            if (opts.isArchief) {
                var tag = document.createElement('span');
                tag.className = 'archief-tag';
                tag.innerText = '📦 Archief';
                body.appendChild(tag);
            }

            /* Zwevend-badge */
            if (placement.zwevend) {
                var zbadge = document.createElement('span');
                zbadge.className = 'zwevend-badge';
                zbadge.innerText = '☁ Onzeker';
                body.appendChild(zbadge);
            }

            var infoEl = document.createElement('div');
            infoEl.className = 'card-info-placement';
            infoEl.innerText = placement.infoPlaatsing || '';
            maakBewerkbaarVeld(infoEl, function(txt) {
                updateInstantieInfo(cardIdVanInstantie(placement.instanceId), placement.instanceId, txt);
            });
            body.appendChild(infoEl);

            el.appendChild(body);

            var stijl = bepaalTrelloKaartStijl(card.members);
            el.style.backgroundColor = stijl.bg;
            el.style.color           = stijl.text;

            el.addEventListener('dragstart', drag);
            el.addEventListener('dragend',   dragEnd);

            /* Resize-handvat → uitrekken naar meerdere dagen */
            if (opts.metResize && isAdmin && opts.ctx) {
                var handle = maakResizeHandle(function(e) { startPlacementResize(e, placement, opts.ctx); });
                el.appendChild(handle);
            }

            /* Zwevend-toggle knop voor 1-dag kaarten */
            if (isAdmin && opts.ctx) {
                var zwBtn = document.createElement('span');
                zwBtn.className = 'zwevend-toggle-btn' + (placement.zwevend ? ' actief' : '');
                zwBtn.title = placement.zwevend ? 'Markeer als zeker ingepland' : 'Markeer als onzeker (zwevend)';
                zwBtn.innerHTML = '☁';
                (function(p, ctx) {
                    zwBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleZwevend(p, ctx);
                    });
                })(placement, opts.ctx);

                var controls = document.createElement('div');
                controls.className = 'card-controls';
                controls.appendChild(zwBtn);
                el.appendChild(controls);
            }

            koppelKaartOpenen(el, {
                kaartData: card, kanTonen: !!opts.kanTonen,
                cardId: cardIdVanInstantie(placement.instanceId), url: opts.url || ''
            });

            return el;
        }

                var controls = document.createElement('div');
                controls.className = 'card-controls';

                var izwBtn = document.createElement('span');
                izwBtn.className = 'zwevend-toggle-btn' + (int.zwevend ? ' actief' : '');
                izwBtn.title = int.zwevend ? 'Markeer als zeker ingepland' : 'Markeer als onzeker (zwevend)';
                izwBtn.innerHTML = '☁';
                izwBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleZwevendInterventie(id);
                });
                controls.appendChild(izwBtn);

                var colorBtn = document.createElement('span');
                colorBtn.className = 'color-btn';
                colorBtn.innerHTML = '🎨';
                colorBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var openMenus = document.querySelectorAll('.color-picker-menu');
                    openMenus.forEach(function(m) { m.remove(); });
                    var pickerMenu = document.createElement('div');
                    pickerMenu.className = 'color-picker-menu';
                    CUSTOM_COLORS.forEach(function(kleur) {
                        var swatch = document.createElement('div');
                        swatch.className = 'color-swatch';
                        swatch.style.backgroundColor = kleur.bg;
                        swatch.addEventListener('click', function(e2) {
                            e2.stopPropagation();
                            setInterventionColor(id, el, kleur);
                            pickerMenu.remove();
                        });
                        pickerMenu.appendChild(swatch);
                    });
                    controls.appendChild(pickerMenu);
                });
                controls.appendChild(colorBtn);

                var delBtn = document.createElement('span');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '&times;';
                delBtn.addEventListener('click', function(e) { e.stopPropagation(); verwijderInterventie(id); });
                controls.appendChild(delBtn);
                el.appendChild(controls);
            }

            el.addEventListener('dragstart', drag);
            el.addEventListener('dragend',   dragEnd);
            return el;
        }

        /* ── DATA OPSLAG ── */
        function updateInstantieInfo(cardId, instanceId, tekst) {
            t.get(cardId, 'shared', 'placements', []).then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                return t.set(cardId, 'shared', 'placements',
                    arr.map(function(p) { if (p.instanceId === instanceId) p.infoPlaatsing = tekst; return p; })
                );
            });
        }

        function updateInterventionText(id, tekst) {
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                return t.set('board', 'shared', 'interventions',
                    lijst.map(function(i) { if (i.id === id) i.name = tekst; return i; })
                );
            });
        }
        function updateInterventionAddress(id, adres) {
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                return t.set('board', 'shared', 'interventions',
                    lijst.map(function(i) { if (i.id === id) i.address = adres; return i; })
                );
            });
        }
        function updateInterventionInfo(id, tekst) {
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                return t.set('board', 'shared', 'interventions',
                    lijst.map(function(i) { if (i.id === id) i.infoPlaatsing = tekst; return i; })
                );
            });
        }
        function setInterventionColor(id, kaartEl, gekozenKleurObj) {
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                var geupdatet = lijst.map(function(item) {
                    if (item.id === id) { item.colorObj = gekozenKleurObj; }
                    return item;
                });
                return t.set('board', 'shared', 'interventions', geupdatet).then(function() {
                    kaartEl.style.backgroundColor = gekozenKleurObj.bg;
                    kaartEl.style.color           = gekozenKleurObj.text;
                });
            });
        }

        /* ── ZWEVEND TOGGLE voor snelle interventies ── */
        function toggleZwevendInterventie(id) {
            if (!isAdmin) return;
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                var gewijzigd = null;
                arr = arr.map(function(i) {
                    if (i.id === id) { i.zwevend = !i.zwevend; gewijzigd = i; }
                    return i;
                });
                return t.set('board', 'shared', 'interventions', arr).then(function() { return gewijzigd; });
            }).then(function(int) {
                if (!int) return;
                var oud      = document.getElementById(id);
                var lane     = oud ? oud.dataset.lane : undefined;
                var ploegRow = oud ? oud.dataset.ploegRow : undefined;
                var parent   = oud ? oud.parentNode : null;
                var nieuw    = maakInterventieKaart(int);
                if (lane !== undefined)     nieuw.dataset.lane     = lane;
                if (ploegRow !== undefined) nieuw.dataset.ploegRow = ploegRow;
                if (parent) { parent.replaceChild(nieuw, oud); }
                else if (oud && oud.parentNode) { oud.parentNode.removeChild(oud); }
                herlayoutPloegRijen();
            });
        }

        function voegDirecteInterventieToe(ploeg, datum) {
            if (!isAdmin) return;
            var nieuw = {
                id: 'int-' + Date.now(), name: 'Nieuwe interventie',
                ploeg: ploeg, datum: datum, members: [],
                address: '', infoPlaatsing: '', colorObj: CUSTOM_COLORS[0]
            };
            t.get('board', 'shared', 'interventions', [])
            .then(function(lijst) {
                var arr = Array.isArray(lijst) ? lijst : [];
                arr.push(nieuw);
                return t.set('board', 'shared', 'interventions', arr);
            })
            .then(function() {
                var cardEl = maakInterventieKaart(nieuw);
                var zone = document.getElementById(maakZoneId(ploeg, datum));
                if (zone) {
                    var iposNew = stapelReserveer([maakZoneId(ploeg, datum)], nieuw.id);
                    cardEl.dataset.lane     = iposNew.rij;
                    cardEl.dataset.ploegRow = ploeg;
                    zone.appendChild(cardEl);
                    herlayoutPloegRijen();
                } else {
                    document.getElementById('sidebar-pool').appendChild(cardEl);
                }
                var titleEl = cardEl.querySelector('.card-title');
                if (titleEl) {
                    titleEl.contentEditable = true;
                    titleEl.focus();
                    var range = document.createRange();
                    range.selectNodeContents(titleEl);
                    var sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            });
        }

        function verwijderInterventie(id) {
            if (!isAdmin) return;
            t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                var gefilterd = lijst.filter(function(i) { return i.id !== id; });
                return t.set('board', 'shared', 'interventions', gefilterd);
            }).then(function() {
                var el = document.getElementById(id);
                if (el && el.parentNode) el.parentNode.removeChild(el);
                stapelVrijgeven(id);
                herlayoutPloegRijen();
            });
        }

        /* ── DRAG AND DROP ── */
        function allowDrop(e) {
            if (!isAdmin) return;
            var dragType = document.body.dataset.dragType || '';
            var zoneIsVerlof = (this.dataset.rowType === 'verlof');
            if (dragType === 'verlof' && !zoneIsVerlof) return;
            if (dragType && dragType !== 'verlof' && zoneIsVerlof) return;
            e.preventDefault();
            this.classList.add('dragover');
        }
        function dragLeave(e) { this.classList.remove('dragover'); }

        function drag(e) {
            if (!isAdmin) { e.preventDefault(); return; }
            var rol = e.currentTarget.dataset.rol || '';
            document.body.dataset.dragType = rol;
            var transferId;
            if (rol === 'verlof' && e.currentTarget.dataset.verlofId) {
                transferId = e.currentTarget.dataset.verlofId;
            } else if (rol === 'instantie' && e.currentTarget.dataset.instanceId) {
                transferId = e.currentTarget.dataset.instanceId;
            } else {
                transferId = e.currentTarget.id;
            }
            e.dataTransfer.setData("text", transferId);
        }
        function dragEnd(e) { delete document.body.dataset.dragType; }

        function drop(e) {
            if (!isAdmin) return;
            e.preventDefault();
            this.classList.remove('dragover');
            delete document.body.dataset.dragType;

            var doelZone = this;
            var id       = e.dataTransfer.getData("text");
            if (!id) return;

            var doelPloeg    = doelZone.dataset.ploeg;
            var doelDatum    = doelZone.dataset.datum;
            var doelRowType  = doelZone.dataset.rowType || '';
            var naarZijbalk  = !doelPloeg;

            var soort;
            if (id.indexOf('verlof-') === 0)   soort = 'verlof';
            else if (id.indexOf('int-') === 0) soort = 'interventie';
            else if (id.indexOf('::') !== -1)  soort = 'instantie';
            else                               soort = 'bron';

            /* ── VERLOF: hele range verplaatsen ── */
            if (soort === 'verlof') {
                if (naarZijbalk || doelRowType !== 'verlof') return;
                t.get('board', 'shared', 'verlofItems', []).then(function(lijst) {
                    var arr = Array.isArray(lijst) ? lijst : [];
                    var item = null;
                    arr.forEach(function(v) { if (v.id === id) item = v; });
                    if (!item) return;
                    var oudeStart = item.startDatum || item.datum;
                    var oudeEind  = item.eindDatum  || oudeStart;
                    if (oudeStart === doelDatum) return;
                    var rangeLengte = aantalDagenTussen(oudeStart, oudeEind);
                    item.startDatum = doelDatum;
                    item.eindDatum  = voegDagenToe(doelDatum, rangeLengte);
                    delete item.datum;
                    return t.set('board', 'shared', 'verlofItems', arr).then(function() {
                        hertekenEnkelVerlofItem(item);
                    });
                });
                return;
            }

            if (doelRowType === 'verlof' && soort !== 'verlof') return;

            /* ── TRELLO-INSTANTIE: hele range verplaatsen / naar zijbalk verwijderen ── */
            if (soort === 'instantie') {
                var cardId = cardIdVanInstantie(id);
                var ctx = placementCtx[id];

                if (naarZijbalk) {
                    document.querySelectorAll('[data-instance-id="' + id + '"]').forEach(function(el) {
                        if (el.parentNode) el.parentNode.removeChild(el);
                    });
                    stapelVrijgeven(id);   /* gereserveerde stapel-rijen vrijgeven */
                    t.get(cardId, 'shared', 'placements', []).then(function(lijst) {
                        var arr = (Array.isArray(lijst) ? lijst : []).filter(function(p) { return p.instanceId !== id; });
                        return t.set(cardId, 'shared', 'placements', arr).then(function() { return arr.length; });
                    }).then(function(aantal) {
                        updateBronBadgeById(cardId, aantal);
                        if (aantal === 0) verwijderCardUitIndex(cardId);
                    });
                    return;
                }

                t.get(cardId, 'shared', 'placements', []).then(function(lijst) {
                    var arr = Array.isArray(lijst) ? lijst : [];
                    var doelP = null;
                    arr = arr.map(function(p) {
                        if (p.instanceId === id) {
                            var oudStart = p.datum;
                            var oudEind  = p.eindDatum || p.datum;
                            var len = aantalDagenTussen(oudStart, oudEind);
                            p.ploeg = doelPloeg;
                            p.datum = doelDatum;
                            if (len > 0) { p.eindDatum = voegDagenToe(doelDatum, len); }
                            else { delete p.eindDatum; }
                            doelP = p;
                        }
                        return p;
                    });
                    return t.set(cardId, 'shared', 'placements', arr).then(function() { return doelP; });
                }).then(function(doelP) {
                    if (!doelP) return;
                    if (ctx) { ctx.ploeg = doelPloeg; }
                    else {
                        /* Fallback context als die ontbreekt: live kaart of gedeelde snapshot */
                        var liveCard = trelloKaartCache[cardId];
                        if (liveCard) {
                            ctx = {
                                card: liveCard, kanTonen: true, url: liveCard.url || '',
                                isArchief: false, ploeg: doelPloeg
                            };
                            hertekenEnkelPlacement(doelP, ctx);
                        } else {
                            /* Gearchiveerd: haal de gedeelde snapshot op */
                            t.get(cardId, 'shared', 'cardSnapshot', null).then(function(snap) {
                                ctx = {
                                    card: snapshotNaarKaart(snap || {}), kanTonen: false,
                                    url: (snap && (snap.u || snap.url)) || '',
                                    isArchief: true, ploeg: doelPloeg
                                };
                                hertekenEnkelPlacement(doelP, ctx);
                            });
                        }
                        return;
                    }
                    hertekenEnkelPlacement(doelP, ctx);
                });
                return;
            }

            /* Voor bron & interventie: het DOM-element heeft id == transfer-id */
            var cardEl = document.getElementById(id);

            /* ── BRON-KAART → nieuwe instantie (1 dag) ── */
            if (soort === 'bron') {
                if (naarZijbalk) return;
                var card = trelloKaartCache[id];
                if (!card) return;

                /* Slanke placement: GEEN ingebedde snapshot (die staat 1x in cardSnapshot) */
                var nieuwePlacement = {
                    instanceId:    genInstanceId(id),
                    ploeg:         doelPloeg,
                    datum:         doelDatum,
                    infoPlaatsing: ''
                };

                /* Houd de gedeelde snapshot vers (1x per kaart) */
                t.set(id, 'shared', 'cardSnapshot', maakKaartSnapshot(card));

                t.get(id, 'shared', 'placements', []).then(function(lijst) {
                    var arr = Array.isArray(lijst) ? lijst : [];
                    arr.push(nieuwePlacement);
                    return t.set(id, 'shared', 'placements', arr).then(function() { return arr.length; });
                }).then(function(aantal) {
                    var ctx = { card: card, kanTonen: true, url: card.url || '', isArchief: false, ploeg: doelPloeg };
                    tekenPlacement(nieuwePlacement, ctx);
                    herlayoutPloegRijen();
                    updateBronBadgeById(id, aantal);
                    voegCardToeAanIndex(id);
                });
                return;
            }

            if (!cardEl) return;

            /* ── INTERVENTIE ── */
            if (naarZijbalk) {
                stapelVrijgeven(id);
                cardEl.style.top = '';
                cardEl.style.height = '';
                cardEl.style.bottom = '';
                delete cardEl.dataset.lane;
                delete cardEl.dataset.ploegRow;
                document.getElementById('sidebar-pool').appendChild(cardEl);
                t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                    return t.set('board', 'shared', 'interventions', lijst.map(function(item) {
                        if (item.id === id) { item.ploeg = null; item.datum = null; }
                        return item;
                    }));
                });
                herlayoutPloegRijen();
                var zoekVeldA = document.getElementById('sidebar-search');
                if (zoekVeldA) filterZijbalk(zoekVeldA.value);
            } else {
                stapelVrijgeven(id);
                var iposMove = stapelReserveer([maakZoneId(doelPloeg, doelDatum)], id);
                cardEl.dataset.lane     = iposMove.rij;
                cardEl.dataset.ploegRow = doelPloeg;
                doelZone.appendChild(cardEl);
                t.get('board', 'shared', 'interventions', []).then(function(lijst) {
                    return t.set('board', 'shared', 'interventions', lijst.map(function(item) {
                        if (item.id === id) { item.ploeg = doelPloeg; item.datum = doelDatum; }
                        return item;
                    }));
                });
                herlayoutPloegRijen();
            }
        }

        var poolEl = document.getElementById('sidebar-pool');
        poolEl.addEventListener('dragover', function(e) {
            if (!isAdmin) return;
            var dragType = document.body.dataset.dragType || '';
            if (dragType === 'verlof') return;
            e.preventDefault();
            poolEl.classList.add('dragover');
        });
        poolEl.addEventListener('dragleave', function() { poolEl.classList.remove('dragover'); });
        poolEl.addEventListener('drop', function(e) {
            if (!isAdmin) return;
            var dragType = document.body.dataset.dragType || '';
            if (dragType === 'verlof') {
                poolEl.classList.remove('dragover');
                delete document.body.dataset.dragType;
                return;
            }
            drop.call(poolEl, e);
        });

        var searchInput = document.getElementById('sidebar-search');
        if (searchInput) {
            searchInput.addEventListener('input', function() { filterZijbalk(this.value); });
        }

        /* Na het bewerken van een tekstveld in een kaart kan de hoogte wijzigen →
           banen opnieuw uitlijnen zodat er niets gaat overlappen. */
        document.addEventListener('focusout', function(e) {
            var t2 = e.target;
            if (t2 && t2.closest && t2.closest('.dropzone[data-row-type="ploeg"]')) {
                setTimeout(herlayoutPloegRijen, 0);
            }
        });
    </script>
</body>
</html>
