<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Ploegen Planning Connector</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
    <script>
        TrelloPowerUp.initialize({
            'board-buttons': function(t, options) {
                return [{
                    icon: 'https://trello.com/favicon.ico',
                    text: 'Ploegen Planning',
                    callback: function(t) {
                        // In plaats van een alert openen we nu een paginagroot venster
                        return t.modal({
                            url: './planning.html',
                            fullscreen: true,
                            title: 'Ploegen Planning'
                        });
                    }
                }];
            }
        });
    </script>
</body>
</html>
