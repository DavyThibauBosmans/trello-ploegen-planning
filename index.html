<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <!-- 1. Laad de Trello bibliotheek in -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>

    <!-- 2. De eigenlijke JavaScript code MOET binnen script tags staan! -->
    <script>
        TrelloPowerUp.initialize({
            'board-buttons': function (t, opts) {
                return [{
                    icon: 'https://cdn.jsdelivr.net/gh/clistudios/trello-planning@main/icon.svg',
                    text: 'Ploegen Planning',
                    callback: function (t) {
                        return t.modal({
                            title: 'Ploegen Planning',
                            url: './planning.html',
                            fullscreen: true
                        });
                    }
                }];
            },
            
            'card-back-section': function(t, options) {
                return t.get('card', 'shared', 'infoPlaatsing')
                .then(function(infoPlaatsing) {
                    if (infoPlaatsing && infoPlaatsing.trim() !== "") {
                        return {
                            title: 'ℹ️ Info Plaatsing (Planning)',
                            icon: 'https://cdn.jsdelivr.net/gh/clistudios/trello-planning@main/icon.svg',
                            content: {
                                type: 'iframe',
                                url: './card-back.html',
                                height: 50
                            }
                        };
                    }
                    return null;
                });
            }
        });
    </script>
</body>
</html>
